<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>PrintFlow365 | Price Tag Catalog</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f5f5f5;
color:#222;
}

header{
background:#111;
color:#fff;
padding:15px;
text-align:center;
}

header h1{font-size:24px;}
header p{font-size:14px;margin-top:5px;}

.container{padding:12px;}

#search{
width:100%;
padding:12px;
border:1px solid #ccc;
border-radius:8px;
font-size:16px;
margin-bottom:10px;
}

/* ORDER BUTTON */
#orderBtn{
width:100%;
padding:12px;
margin-bottom:15px;
background:#25D366;
color:#fff;
border:none;
border-radius:8px;
font-size:16px;
font-weight:bold;
cursor:pointer;
}

/* GRID */
.grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:12px;
}

.card{
background:#fff;
border-radius:10px;
overflow:hidden;
box-shadow:0 2px 8px rgba(0,0,0,.12);
position:relative;
}

.card img{
width:100%;
display:block;
}

.selectBox{
position:absolute;
top:8px;
left:8px;
transform:scale(1.3);
}

.info{
padding:10px;
}

.code{
font-weight:bold;
font-size:15px;
margin-bottom:5px;
}

.name{
font-size:14px;
margin-bottom:10px;
}

footer{
padding:20px;
text-align:center;
font-size:13px;
color:#666;
}
</style>

</head>
<body>

<header>
<h1>PrintFlow365</h1>
<p>Price Tag Catalog</p>
</header>

<div class="container">

<input type="text" id="search" placeholder="Search Product Code...">

<button id="orderBtn" onclick="orderSelected()">
Order Selected on WhatsApp
</button>

<div id="products" class="grid"></div>

</div>

<footer>
WhatsApp:
<a href="https://wa.me/971527581014">+971527581014</a>
</footer>

<script>

let allProducts=[];

fetch("products.json")
.then(r=>r.json())
.then(data=>{
allProducts=data;
showProducts(data);
});

function showProducts(list){

let html="";

list.forEach(p=>{

html+=`
<div class="card">
    <input class="selectBox" type="checkbox" data-code="${p.code}" data-name="${p.name}">
    <img src="images/${p.image}" alt="${p.code}">
    <div class="info">
        <div class="code">${p.code}</div>
        <div class="name">${p.name}</div>
    </div>
</div>
`;
});

document.getElementById("products").innerHTML=html;
}

function orderSelected(){

let selected=document.querySelectorAll(".selectBox:checked");

if(selected.length===0){
alert("Please select at least one product");
return;
}

let msg="Hello, I want to order:%0A";

selected.forEach(item=>{
msg += "- " + item.dataset.code + " (" + item.dataset.name + ")%0A";
});

let phone="971527581014";

let url="https://wa.me/"+phone+"?text="+encodeURIComponent(msg);

window.open(url,"_blank");

}

document.getElementById("search").addEventListener("keyup",function(){

let keyword=this.value.toLowerCase();

let filtered=allProducts.filter(p=>
p.code.toLowerCase().includes(keyword) ||
p.name.toLowerCase().includes(keyword)
);

showProducts(filtered);

});

</script>

</body>
</html>

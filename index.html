<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>PrintFlow365 V4.0</title>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js"></script>

<style>
body { font-family: Arial; margin: 0; background:#f5f5f5; }

header {
  background:#111;
  color:white;
  padding:10px;
  text-align:center;
}

.controls{
  display:flex;
  gap:10px;
  padding:10px;
  flex-wrap:wrap;
  background:white;
}

input, select{
  padding:10px;
  flex:1;
  min-width:120px;
  border:1px solid #ccc;
  border-radius:5px;
}

input:focus, select:focus{
  border:2px solid green;
  outline:none;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(180px,1fr));
  gap:10px;
  padding:10px;
}

.card{
  background:white;
  padding:10px;
  border-radius:10px;
}

.card img{
  width:100%;
  height:120px;
  object-fit:cover;
  border-radius:5px;
}

.price{
  color:green;
  font-weight:bold;
}

button{
  width:100%;
  padding:8px;
  margin-top:5px;
  cursor:pointer;
}
</style>
</head>

<body>

<header>
  <h2>PrintFlow365 V4.0</h2>
</header>

<div class="controls">
  <input id="search" placeholder="Search product...">

  <select id="category">
    <option value="">All Category</option>
  </select>

  <select id="subcategory">
    <option value="">All Subcategory</option>
  </select>
</div>

<div class="grid" id="products"></div>

<script>
const firebaseConfig = {
  apiKey: "YOUR_KEY",
  authDomain: "YOUR_DOMAIN",
  projectId: "YOUR_PROJECT"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let allProducts = [];

// Load products
async function loadProducts(){
  const snap = await db.collection("products").get();
  allProducts = snap.docs.map(d => d.data());
  render(allProducts);
  fillFilters(allProducts);
}

// Render products
function render(list){
  const box = document.getElementById("products");
  box.innerHTML = "";

  list.forEach(p => {
    const img = p.images?.[0] || "";

    box.innerHTML += `
      <div class="card">
        <img src="${img}">
        <h4>${p.name}</h4>
        <p>${p.category} / ${p.subcategory}</p>
        <p class="price">$${p.sellingPrice}</p>
        <p>Stock: ${p.stock}</p>
        <button onclick="order('${p.name}',${p.sellingPrice})">Order</button>
      </div>
    `;
  });
}

// Fill dropdowns
function fillFilters(list){
  const cat = document.getElementById("category");
  const sub = document.getElementById("subcategory");

  let cats = [...new Set(list.map(p=>p.category))];
  let subs = [...new Set(list.map(p=>p.subcategory))];

  cats.forEach(c=>{
    cat.innerHTML += `<option value="${c}">${c}</option>`;
  });

  subs.forEach(s=>{
    sub.innerHTML += `<option value="${s}">${s}</option>`;
  });
}

// FILTER FIXED LOGIC
function filter(){
  let q = document.getElementById("search").value.toLowerCase();
  let c = document.getElementById("category").value;
  let s = document.getElementById("subcategory").value;

  let result = allProducts.filter(p=>{
    return (
      (!q || p.name.toLowerCase().includes(q)) &&
      (!c || p.category === c) &&
      (!s || p.subcategory === s)
    );
  });

  render(result);
}

// EVENTS
document.getElementById("search").addEventListener("input", filter);

document.getElementById("category").addEventListener("change", function(){
  document.getElementById("subcategory").value = "";
  filter();
});

document.getElementById("subcategory").addEventListener("change", filter);

// WhatsApp order
function order(name, price){
  let msg = `Order:\nProduct: ${name}\nPrice: ${price}`;
  let url = `https://wa.me/YOUR_NUMBER?text=${encodeURIComponent(msg)}`;
  window.open(url,"_blank");
}

loadProducts();
</script>

</body>
</html>

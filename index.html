

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PrintFlow365 Catalog V3.0</title>

<style>
body {
    font-family: Arial;
    margin: 0;
    background: #f4f6f9;
}
<div style="padding:10px;text-align:center;">
    <select id="customer" style="padding:8px;width:95%;">
        <option value="Unknown|0000000000">Select Customer</option>
        <option value="Rishi-Asdiqa|+971 52 944 0881">Rishi-Asdiqa</option>
        <option value="Binoy Thomas|+971 50 795 7882">Binoy Thomas-Asdiqa</option>
        <option value="Ahmed Brother-Landstock|+971 58 197 0433">Ahmed Brother-Landstock</option>
        <option value="Basam Vai-Landstock|+971 54 238 0053">Balsam Vai-Landstock</option>
        <option value="Majid Vai Irani|+971 55 866 1020">Majid Vai Irani</option>
<option value="Monir Vai Ind.4|+971524818722">Monir Vai Ind.4</option>
<option value="Shamim|+971568923470">Shamim</option>
    </select>
</div>
header {
    background: #111827;
    color: white;
    padding: 15px;
    text-align: center;
    font-size: 20px;
}

.search-box {
    padding: 10px;
    text-align: center;
}

.search-box input {
    width: 95%;
    padding: 10px;
    font-size: 16px;
}

.container {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    gap: 10px;
    padding: 10px;
}

.card {
    background: white;
    border-radius: 10px;
    padding: 10px;
    box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    text-align: center;
}

.card img {
    width: 100%;
    height: 120px;
    object-fit: cover;
    border-radius: 8px;
}

.price {
    color: green;
    font-weight: bold;
}

.qty {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 8px;
    margin-top: 5px;
}

.qty button {
    padding: 3px 10px;
    border: none;
    background: #111827;
    color: white;
    border-radius: 5px;
    cursor: pointer;
}

.category-title {
    padding: 10px;
    font-weight: bold;
    font-size: 18px;
    background: #e5e7eb;
}

.cart-bar {
    position: fixed;
    bottom: 0;
    width: 100%;
    background: #111827;
    color: white;
    display: flex;
    justify-content: space-between;
    padding: 10px;
    align-items: center;
}

button.order {
    background: #22c55e;
    border: none;
    padding: 8px 12px;
    border-radius: 5px;
    color: white;
}
</style>
</head>

<body>

<header>PrintFlow365 Catalog V3.0</header>

<div class="search-box">
<input type="text" id="search" placeholder="Search products...">
</div>

<div id="productList"></div>

<div class="cart-bar">
<div id="summary">Items: 0 | Total: 0 AED</div>
<button class="order" onclick="sendWhatsApp()">Order</button>
</div>

<script>
let cart = {};
let products = [];

fetch("products.json")
.then(res => res.json())
.then(data => {
    products = data;
    render(products);
});

function render(list) {
    const container = document.getElementById("productList");
    container.innerHTML = "";

    // STEP 1: group (category → subcategory)
    const grouped = {};

    list.forEach((p, i) => {
        const cat = p.category || "Uncategorized";
        const sub = p.subcategory || "General";

        if (!grouped[cat]) grouped[cat] = {};
        if (!grouped[cat][sub]) grouped[cat][sub] = [];

        grouped[cat][sub].push({
            ...p,
            index: i
        });
    });

    // STEP 2: render UI
    Object.keys(grouped).forEach(category => {

        container.innerHTML += `
            <div class="category-title">${category}</div>
        `;

        Object.keys(grouped[category]).forEach(subcategory => {

            container.innerHTML += `
                <div style="padding:8px 10px;font-weight:bold;background:#e5e7eb;">
                    → ${subcategory}
                </div>
            `;

            grouped[category][subcategory].forEach(p => {

                container.innerHTML += `
                    <div class="card">
                        <img src="images/${p.image}" alt="${p.name}">
                        <h4>${p.name}</h4>
                        <div class="price">${p.price} AED</div>

                        <div class="qty">
    <input type="number"
        id="q_${p.index}"
        value="0"
        min="0"
        step="1"
        style="width:80px;text-align:center;padding:5px;"
        onchange="setQty(${p.index}, this.value)"
    >
</div>
                    </div>
                `;
            });
        });
    });

    updateUI();
}
function changeQty(i, val) {
    if (!cart[i]) cart[i] = 0;
    cart[i] += val;

    if (cart[i] < 0) cart[i] = 0;

    document.getElementById("q_" + i).innerText = cart[i];
    updateUI();
}

function updateUI() {
    let totalItems = 0;
    let totalPrice = 0;

    Object.keys(cart).forEach(i => {
        let qty = cart[i];
        totalItems += qty;
        totalPrice += qty * products[i].price;
    });

    document.getElementById("summary").innerText =
        `Items: ${totalItems} | Total: ${totalPrice} AED`;
}

document.getElementById("search").addEventListener("input", function() {
    let val = this.value.toLowerCase();

    let filtered = products.filter(p =>
        p.name.toLowerCase().includes(val) ||
        p.category.toLowerCase().includes(val)
    );

    render(filtered);
});

function sendWhatsApp() {
    let msg = "Order from PrintFlow365:%0A";
let customer = document.getElementById("customer").value;
let [name, phone] = customer.split("|");
    let total = 0;

    Object.keys(cart).forEach(i => {
        let qty = cart[i];
        if (qty > 0) {
            msg += `${products[i].name} x ${qty}%0A`;
            total += qty * products[i].price;
        }
    });

    msg += `%0ATotal: ${total} AED`;

    let phone = "971527581014";
    window.open("https://wa.me/" + phone + "?text=" + msg, "_blank");
}
</script>

</body>
</html>

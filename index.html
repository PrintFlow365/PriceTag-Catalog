<!DOCTYPE html>
<html>
<head>
  <title>PrintFlow365 V3.0</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"></script>

  <style>
    body { font-family: Arial; padding: 10px; }
    .box { max-width: 400px; margin: auto; }
    input, button { width: 100%; padding: 10px; margin: 5px 0; }
    .hidden { display: none; }
  </style>
</head>

<body>

<div id="loginBox" class="box">
  <h2>Login</h2>
  <input id="email" placeholder="Email">
  <input id="password" type="password" placeholder="Password">
  <button onclick="login()">Login</button>
</div>

<div id="app" class="hidden box">
  <h3>Welcome, <span id="userName"></span></h3>

  <h4>Order Products</h4>
  <input id="product" placeholder="Product name">
  <input id="qty" placeholder="Quantity">
  <button onclick="placeOrder()">Send WhatsApp Order</button>

  <h4>Your Orders</h4>
  <div id="orders"></div>

  <button onclick="logout()">Logout</button>
</div>

<script>
  const firebaseConfig = {
  apiKey: "AIzaSy....",
  authDomain: "printflow365.firebaseapp.com",
  projectId: "printflow365",
  storageBucket: "printflow365.appspot.com",
  messagingSenderId: "752851933522",
  appId: "1:752851933522:web:cb71d642a8b7ccf49ec28b"
};
  firebase.initializeApp(firebaseConfig);
  const auth = firebase.auth();
  const db = firebase.firestore();

  let currentUser = null;

  function login() {
    const email = document.getElementById('email').value;
    const pass = document.getElementById('password').value;

    auth.signInWithEmailAndPassword(email, pass)
      .then(user => {
        currentUser = user.user;
        loadApp();
      })
      .catch(err => alert(err.message));
  }

  function loadApp() {
    document.getElementById('loginBox').classList.add('hidden');
    document.getElementById('app').classList.remove('hidden');

    document.getElementById('userName').innerText = currentUser.email;

    loadOrders();
  }

  function placeOrder() {
    let product = document.getElementById('product').value;
    let qty = document.getElementById('qty').value;

    let msg = `Customer: ${currentUser.email}\nProduct: ${product}\nQty: ${qty}`;

    // WhatsApp send
    window.open(`https://wa.me/971527581014?text=${encodeURIComponent(msg)}`);

    // Save order
    db.collection("orders").add({
      email: currentUser.email,
      product: product,
      qty: qty,
      time: new Date()
    });

    loadOrders();
  }

  function loadOrders() {
    db.collection("orders")
      .where("email", "==", currentUser.email)
      .get()
      .then(snapshot => {
        let html = "";
        snapshot.forEach(doc => {
          let d = doc.data();
          html += `<p>${d.product} - ${d.qty}</p>`;
        });
        document.getElementById('orders').innerHTML = html;
      });
  }

  function logout() {
    auth.signOut();
    location.reload();
  }
</script>

</body>
</html>
